<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Registration — Echo</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .form-wrap { max-width: 620px; margin: 0 auto; }
        .form-section { background: white; border-radius: var(--radius-md); border: 1px solid var(--gray-300); padding: 1.75rem; margin-bottom: 1.25rem; }
        .form-section h3 { font-size: 0.95rem; color: var(--echo-blue); font-weight: 700; margin-bottom: 1.25rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--gray-100); display: flex; align-items: center; gap: 0.5rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--gray-700); margin-bottom: 0.35rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.7rem 0.9rem; border: 1.5px solid var(--gray-300); border-radius: var(--radius-sm); font-size: 0.88rem; outline: none; }
        .required::after { content: " *"; color: var(--echo-red); }
        @media (max-width: 540px) { .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="../../home.html" class="logo">ECHO</a>
            <a href="../../get-started.html" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> Change Role</a>
        </div>
    </nav>

    <section class="section">
        <div class="container form-wrap">
            <div class="text-center" style="margin-bottom: 1.75rem;">
                <div class="role-badge"><i class="fas fa-user-shield"></i> School Admin Registration</div>
                <h2 style="margin-top: 0.75rem; font-size: 1.5rem;">Register your school on Echo</h2>
            </div>

            <form id="adminRegForm">
                <div class="form-section">
                    <h3><i class="fas fa-user-shield"></i> Your Account</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="required">First Name</label>
                            <input type="text" id="firstName" placeholder="e.g. Emeka" required>
                        </div>
                        <div class="form-group">
                            <label class="required">Last Name</label>
                            <input type="text" id="lastName" placeholder="e.g. Okafor" required>
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="required">Email Address</label>
                            <input type="email" id="email" placeholder="admin@school.ng" required>
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" id="phone" placeholder="08012345678">
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="required">Password</label>
                            <input type="password" id="password" placeholder="Min 8 characters" required>
                        </div>
                        <div class="form-group">
                            <label class="required">Confirm Password</label>
                            <input type="password" id="confirmPassword" required>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3><i class="fas fa-school"></i> School Information</h3>
                    <div class="form-group">
                        <label class="required">School Name</label>
                        <input type="text" id="schoolName" placeholder="e.g. Greenwood High" required>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="required">School Type</label>
                            <select id="schoolType" required>
                                <option value="">Select type</option>
                                <option value="primary">Primary School</option>
                                <option value="junior">Junior Secondary</option>
                                <option value="senior">Senior Secondary</option>
                                <option value="combined">Combined</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="required">State</label>
                            <input type="text" id="state" placeholder="e.g. Lagos" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%;" id="regBtn">
                    <i class="fas fa-school"></i> Register School
                </button>
            </form>
        </div>
    </section>

    <script src="../../js/api.js"></script>
    <script src="../../js/auth.js"></script> 
    
    <script>
    document.getElementById('adminRegForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // 1. Grab values by ID (Reliable)
        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const schoolName = document.getElementById('schoolName').value.trim();
        const schoolType = document.getElementById('schoolType').value;
        const state = document.getElementById('state').value.trim();

        // 2. Validation
        if (password !== confirmPassword) return alert('Passwords do not match.');
        if (password.length < 8) return alert('Password too short.');

        const btn = document.getElementById('regBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

        try {
            // Step A: Register User (Notice snake_case keys)
            await Api.post('/register', {
                first_name: firstName,
                last_name: lastName,
                email: email,
                password: password,
            });

            // Step B: Login to get token
            const loginData = await Auth.login(email, password);
            
            // Step C: Create & join school as owner (requires token)
            const userId = loginData?.user?.id || loginData?.user?.user_id || loginData?.user?.uuid;
            const created = await Api.createAndJoinSchool(userId, schoolName, schoolType);

            // Step D: Persist extra metadata (optional fields supported by backend)
            const schoolId = created?.school?.id || created?.school_id;
            if (!schoolId) throw new Error('School created, but no schoolId returned.');
            await Api.updateSchool(schoolId, { country: 'Nigeria', state });

            window.location.href = '../../dashboards/admin/dashboard.html';
        } catch (err) {
            alert(err.message || 'Registration failed');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-school"></i> Register School';
        }
    });
    </script>
</body>
</html>
