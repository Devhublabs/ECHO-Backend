<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to your Echo account to access your school dashboard.">
    <title>Sign In — Echo</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: var(--gray-100); min-height: 100vh; display: flex; flex-direction: column; }
        .login-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .login-card { background: white; border-radius: var(--radius-lg); border: 1px solid var(--gray-300); box-shadow: var(--shadow-lg); padding: 2.5rem; width: 100%; max-width: 440px; }
        .logo-row { display: flex; align-items: center; justify-content: center; gap: .6rem; margin-bottom: 1.75rem; }
        .logo-mark { width: 38px; height: 38px; background: var(--echo-blue); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1rem; color: #fff; }
        .logo-text { font-size: 1.4rem; font-weight: 800; color: var(--echo-dark); letter-spacing: .5px; }
        h2 { font-size: 1.35rem; font-weight: 700; color: var(--echo-dark); text-align: center; margin-bottom: .35rem; }
        .subtitle { text-align: center; color: var(--gray-500); font-size: .875rem; margin-bottom: 1.75rem; }
        .form-group { margin-bottom: 1.1rem; }
        .form-group label { display: block; font-size: .82rem; font-weight: 600; color: var(--gray-700); margin-bottom: .4rem; }
        .input-wrap { position: relative; }
        .input-wrap i { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--gray-400); font-size: .85rem; pointer-events: none; }
        .input-wrap input { width: 100%; padding: .72rem .9rem .72rem 2.25rem; border: 1.5px solid var(--gray-300); border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: .9rem; color: var(--gray-900); outline: none; transition: border-color .2s, box-shadow .2s; }
        .input-wrap input:focus { border-color: var(--echo-blue); box-shadow: 0 0 0 3px rgba(59,130,246,.1); }
        .input-wrap input.err { border-color: var(--echo-red); }
        .toggle-pw { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--gray-400); font-size: .85rem; padding: 0; }
        .toggle-pw:hover { color: var(--gray-700); }
        .forgot-row { display: flex; justify-content: flex-end; margin-top: .35rem; }
        .forgot-row a { font-size: .78rem; color: var(--echo-blue); font-weight: 500; }
        .alert { padding: .7rem 1rem; border-radius: var(--radius-sm); font-size: .83rem; margin-bottom: 1.1rem; display: none; align-items: center; gap: .5rem; }
        .alert.show { display: flex; }
        .alert.error   { background: rgba(239,68,68,.08);  color: #991b1b; border: 1px solid rgba(239,68,68,.25); }
        .alert.success { background: rgba(16,185,129,.08); color: #065f46; border: 1px solid rgba(16,185,129,.25); }
        .btn-login { width: 100%; padding: .78rem; background: var(--echo-blue); color: #fff; border: none; border-radius: var(--radius-sm); font-family: 'Inter', sans-serif; font-size: .93rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: .45rem; transition: background .2s, box-shadow .2s; margin-top: .5rem; }
        .btn-login:hover:not(:disabled) { background: #2563eb; box-shadow: 0 4px 14px rgba(59,130,246,.3); }
        .btn-login:disabled { background: var(--gray-300); cursor: not-allowed; }
        .divider { display: flex; align-items: center; gap: .75rem; margin: 1.25rem 0; color: var(--gray-400); font-size: .78rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--gray-200); }
        .register-links { display: grid; grid-template-columns: repeat(3, 1fr); gap: .5rem; }
        .reg-link { display: flex; flex-direction: column; align-items: center; gap: .3rem; padding: .7rem .5rem; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); text-decoration: none; color: var(--gray-700); font-size: .73rem; font-weight: 600; transition: all .15s; text-align: center; }
        .reg-link:hover { border-color: var(--echo-blue); color: var(--echo-blue); background: rgba(59,130,246,.04); text-decoration: none; }
        .reg-link i { font-size: 1.1rem; }
        .spinner { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <div class="logo-row">
                <div class="logo-mark">E</div>
                <span class="logo-text">Echo</span>
            </div>

            <h2>Welcome back</h2>
            <p class="subtitle">Sign in to your Echo account to continue.</p>

            <div class="alert" id="alertBox">
                <i class="fas fa-exclamation-circle"></i>
                <span id="alertMsg"></span>
            </div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                        <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    <div class="forgot-row"><a href="reset-password.html">Forgot password?</a></div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <div class="spinner" id="spinner"></div>
                    <span id="btnText">Sign In</span>
                </button>
            </form>

            <div class="divider">Don't have an account?</div>

            <div class="register-links">
                <a href="auth/student/register.html" class="reg-link">
                    <i class="fas fa-user-graduate"></i> Student
                </a>
                <a href="auth/teacher/register.html" class="reg-link">
                    <i class="fas fa-chalkboard-teacher"></i> Teacher
                </a>
                <a href="auth/admin/register.html" class="reg-link">
                    <i class="fas fa-user-shield"></i> School Admin
                </a>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
    // Password toggle
    document.getElementById('togglePw').addEventListener('click', function() {
        const pw = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        pw.type = pw.type === 'password' ? 'text' : 'password';
        icon.className = pw.type === 'text' ? 'fas fa-eye-slash' : 'fas fa-eye';
    });

    function showAlert(type, msg) {
        const box = document.getElementById('alertBox');
        box.className = `alert show ${type}`;
        document.getElementById('alertMsg').textContent = msg;
    }

    function setLoading(on) {
        document.getElementById('loginBtn').disabled = on;
        document.getElementById('spinner').style.display = on ? 'block' : 'none';
        document.getElementById('btnText').textContent = on ? 'Signing in...' : 'Sign In';
    }

    // Role → dashboard map
    const dashboards = {
        owner:   'dashboards/admin/dashboard.html',
        admin:   'dashboards/admin/dashboard.html',
        teacher: 'dashboards/teacher/dashboard.html',
        student: 'dashboards/student/dashboard.html',
    };

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        document.getElementById('alertBox').className = 'alert';

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) { showAlert('error', 'Please enter your email and password.'); return; }

        setLoading(true);

        try {
            const data = await Api.login(email, password);

            // Save session
            localStorage.setItem('echo_token', data.token || data.access_token);
            localStorage.setItem('echo_role',  data.user?.role || 'student');
            localStorage.setItem('echo_user',  JSON.stringify(data.user || {}));

            showAlert('success', 'Login successful! Redirecting...');

            // Redirect based on role from API response
            const role = data.user?.role || 'student';
            setTimeout(() => {
                window.location.href = dashboards[role] || dashboards.student;
            }, 900);

        } catch(err) {
            showAlert('error', err?.message || err?.error || 'Login failed. Please check your details.');
            setLoading(false);
        }
    });
    </script>
</body>
</html>
